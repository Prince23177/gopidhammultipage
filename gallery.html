    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg fixed-top navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Gopi Dham</a>
            <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>

                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact & Book</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="hero d-flex align-items-center" style="height: 40vh; background: linear-gradient(rgba(30, 57, 42, 0.9), rgba(30, 57, 42, 0.8)), url('images/exterior-night.jpg') center/cover;">
        <div class="container text-center mt-5">
            <h1 class="text-white">Photo Gallery</h1>
        </div>
    </header>

    <section class="section-padding">
        <div class="container">
            <div class="row g-4">
                <div class="col-md-4 col-sm-6">
                    <div class="gallery-wrapper">
                        <img src="images/exterior-night.jpg" class="img-fluid rounded shadow-sm" alt="Exterior Night">
                    </div>
                </div>
                <div class="col-md-4 col-sm-6">
                    <div class="gallery-wrapper">
                        <img src="images/non-ac-room.jpg" class="img-fluid rounded shadow-sm" alt="Interior Atrium">
                    </div>
                </div>
                <div class="col-md-4 col-sm-6">
                    <div class="gallery-wrapper">
                        <img src="images/balcony.jpg" class="img-fluid rounded shadow-sm" alt="Balcony View">
                    </div>
                </div>
                <div class="col-md-4 col-sm-6">
                    <div class="gallery-wrapper">
                        <img src="images/hero-bg.jpg" class="img-fluid rounded shadow-sm" alt="Building Exterior">
                    </div>
                </div>
                <div class="col-md-4 col-sm-6">
                    <div class="gallery-wrapper">
                        <img src="images/ac-room.jpg" class="img-fluid rounded shadow-sm" alt="Room View">
                    </div>
                </div>
                <div class="col-md-4 col-sm-6">
                    <div class="gallery-wrapper">
                        <img src="images/temple.jpg" class="img-fluid rounded shadow-sm" alt="Ashram Temple">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer Same as index.html -->
    <footer>
        <div class="container">
            <div class="row">
                <div class="col-md-6 mb-4">
                    <h5>Gopi Dham</h5>
                    <p>Your peaceful ashram and comfortable stay near the holy city of Haridwar.</p>
                </div>
                <div class="col-md-6 mb-4 text-md-end">
                    <h5>Quick Contact</h5>
                    <p class="mb-1"><i class="fas fa-phone"></i> +91 88513 92151</p>
                    <p><i class="fas fa-clock"></i> Check-in/Out: 11:00 AM - 12:00 PM</p>
                </div>
            </div>
            <hr class="mt-2 border-secondary">
            <div class="text-center mt-3">
                <p class="mb-0">© 2026 Gopi Dham Hotel & Ashram. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        window.addEventListener('scroll', function() {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled', 'navbar-light');
                navbar.classList.remove('navbar-dark');
            } else {
                navbar.classList.remove('scrolled', 'navbar-light');
                navbar.classList.add('navbar-dark');
            }
        });
    </script>
    <!-- Floating WhatsApp Button -->
    <a href="https://wa.me/918851392151" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

</html>
